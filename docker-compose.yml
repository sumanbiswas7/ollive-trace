services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ollive
      POSTGRES_USER:     ollive
      POSTGRES_PASSWORD: ollive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollive -d ollive"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Override DATABASE_URL from .env — db hostname only resolves inside Docker
      DATABASE_URL: postgres://ollive:ollive@db:5432/ollive
      NODE_ENV:     production
    depends_on:
      db:
        condition: service_healthy

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    restart: unless-stopped
    ports:
      - "8080:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  cloudbeaver_data:
